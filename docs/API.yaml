openapi: 3.1.0
info:
  title: Plexus HTTP API
  version: 0.1.0
  description: |
    Target M1 REST + SSE contract for `plexus-server`. Pairs with
    [DECISIONS.md](DECISIONS.md) and [TOOLS.md](TOOLS.md).

    **Current implementation status:** the current `rebuild-m1-M1d` server
    implements the auth/me/admin-config foundation, chat sessions/message
    ingress/per-session SSE, and M1d server workspace quota + file
    GET/PUT/DELETE routes. User-device workspace routing, channel/cron APIs,
    agent task spawning, and compaction decisions are target M1 routes for
    later slices; their paths remain in this spec so the future contract stays
    visible.

    **Target design principle:** every user-meaningful agent capability has a
    matching REST endpoint over the same underlying abstractions (workspace_fs,
    cron scheduler, etc.). REST and tools are two entrances for two different
    callers (human-via-browser vs. agent-via-LLM) hitting the same service
    layer. Some target M1 routes remain future work.

    **Parallel with tools (see TOOLS.md):**

    | Agent tool | REST equivalent | Notes |
    |---|---|---|
    | `read_file` | `GET /api/workspace/files/{path}` | Query: explicit `plexus_device=server` in M1d |
    | `write_file` | `PUT /api/workspace/files/{path}` | Query: explicit `plexus_device=server` in M1d; implicit mkdir -p |
    | `edit_file` | `PATCH /api/workspace/files/{path}` | Query: `plexus_device`; body: old_text/new_text/replace_all |
    | `delete_file` | `DELETE /api/workspace/files/{path}` | Query: explicit `plexus_device=server` in M1d; always allowed for quota release |
    | `delete_folder` | `DELETE /api/workspace/folders/{path}` | Query: `plexus_device`; recursive, no flag |
    | `list_dir` | `GET /api/workspace/list/{path}` | Query: `plexus_device`, recursive, max_entries |
    | `glob` | `GET /api/workspace/glob` | Query: `plexus_device`, pattern, path, head_limit, offset, entry_type |
    | `grep` | `GET /api/workspace/grep` | Query: `plexus_device`, pattern, path, mode, context_before/after, etc. |
    | `notebook_edit` | — | Target REST equivalent not yet specified; not implemented in M1b |
    | `file_transfer` | `POST /api/workspace/transfer` | Body matches tool args |
    | `cron` | `POST /api/cron` + CRUD | REST uses verbs (POST/GET/DELETE); tool uses single action-enum (nanobot-aligned) |
    | `web_fetch` | — | No REST parallel (browser fetches directly). Tool is shared (server + client sites) per ADR-052. |
    | `message` | — | No REST parallel (browser composes via chat) |
    | `exec` | — | No REST parallel (rare UI need in v1) |

    **Auth model:**

    - `ADMIN_TOKEN` env var: permanent secret. Anyone who presents it during
      registration becomes admin. Multiple admins are supported — share the
      token with teammates who should have admin rights.
    - All other endpoints use JWT, delivered either via `HttpOnly` cookie
      (browser) or `Authorization: Bearer <jwt>` (programmatic).
    - Admin-only endpoints require a valid JWT. The server reloads the current
      user row and requires `users.is_admin=true`; the database row is
      authoritative for admin authorization.

    **Wire conventions:**

    - JSON bodies everywhere except file reads, which return raw file bytes
      with an appropriate `Content-Type`.
    - Errors always return a JSON body: `{code, message}`. `code` values come
      from the `ErrorCode` enum in `plexus-common/src/errors/`.
    - Timestamps are ISO 8601 with timezone offset.
    - UUIDs unless noted.

    **M1c chat consumption pattern (ADR-093):** the SSE stream at
    `GET /api/sessions/{id}/stream` is the single entry point for
    "show me the chat" — it replays recent history on connect, then
    delivers live events. `GET /api/sessions/{id}/messages` is a
    separate cursor-paginated endpoint used only for scroll-up beyond
    the replay window.

    **Not in this spec:**

    - Discord and Telegram ingress. Those are internal adapter modules inside
      `plexus-server`, not public HTTP endpoints. The only public ingress for
      chat messages is `POST /api/sessions/{id}/messages` (browser) plus the
      `WS /ws/device` handshake for devices. These ingress paths are target M1
      behavior. These ingress paths start in M1c for browser chat and expand
      to device/channel adapters in later M1 slices.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://plexus.example.com
    description: Production (behind TLS reverse proxy)

tags:
  - name: Auth
    description: Registration, login, session management
  - name: Me
    description: The authenticated user's own account
  - name: Sessions
    description: M1c chat sessions + messages + SSE stream
  - name: Workspaces
    description: M1d personal server workspace quota plus target shared workspace management
  - name: Workspace Files
    description: M1d server workspace file GET/PUT/DELETE plus target shared file operations
  - name: Devices
    description: Target client device registration and configuration; not implemented in M1b
  - name: Channels
    description: Target Discord / Telegram bot configurations per user; not implemented in M1b
  - name: Cron
    description: Target scheduled agent invocations; not implemented in M1b
  - name: Admin
    description: Admin-only current system config plus target user management and server-side MCPs; target admin users/server MCP routes are not implemented in M1b

security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  #
  # --- Auth ---
  #
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a new user and their auto-created personal workspace.
        If `admin_token` in the body matches `ADMIN_TOKEN` env var, the
        new user is created with `is_admin=true`. Otherwise a regular
        user. On success, returns the JWT and sets the auth cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
                admin_token:
                  type: string
                  description: Optional. Present it to claim `is_admin`.
      responses:
        '201':
          description: Created
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Sets the `plexus_session` HttpOnly cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Email already in use.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (clear session cookie)
      security: []
      responses:
        '204':
          description: Cookie cleared.
          headers:
            Set-Cookie:
              schema: { type: string }

  #
  # --- Me ---
  #
  /api/me:
    get:
      tags: [Me]
      summary: Get the authenticated user's profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Me]
      summary: Update profile (name, email, password)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Email already belongs to another user.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    delete:
      tags: [Me]
      summary: Target delete own account (cascades to all user data; not M1b)
      description: |
        Target M1 route, not implemented in M1b.

        Cascades to devices, sessions, messages, cron_jobs, discord_configs,
        telegram_configs, and personal workspace files (ADR-058).
        Shared workspace memberships are removed; shared workspaces the user
        was in persist for other members.
      responses:
        '204': { description: Account deleted. }

  /api/me/events:
    get:
      tags: [Me]
      summary: Target SSE stream — per-user account-scoped events (ADR-106; not M1b)
      description: |
        Target M1 route, not implemented in M1b.

        Server-Sent Events stream scoped to the authenticated user.
        Carries account-scoped notifications that aren't tied to any
        specific chat session: MCP rejections (ADR-049, ADR-105),
        device offline/online transitions, future quota/config events.

        The frontend opens this once per browser session and keeps it
        alive for the page lifetime, in addition to whatever per-session
        chat streams it has open (ADR-093).

        **Event types:**

        - `mcp_rejected` — an MCP server was removed from a device because
          it failed to register or spawn. Payload includes `device`,
          `server`, `reason` (`schema_collision` | `within_server_collision`
          | `spawn_failed`), `detail`.
        - `device_offline` — a device's WS heartbeat timed out
          (PROTOCOL.md §1.4). Payload: `{ device, last_seen_at }`.
        - `device_online` — a previously-offline device completed WS
          handshake. Payload: `{ device }`.
        - (future) `quota_warning`, `llm_config_invalid`, etc.

        **Reconnect:** uses `Last-Event-ID` for the per-user `event_id`
        cursor. Events are best-effort and ephemeral — if the user
        wasn't connected when one fired, they get the result through
        normal data fetches (e.g. opening Settings → Devices shows a
        rejected MCP gone from the list).

        OpenAPI does not model SSE first-class; event payloads are
        described under `components.schemas` (`UserEvent*`).
      responses:
        '200':
          description: Target SSE stream opened; not implemented in M1b.
          content:
            text/event-stream:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  #
  # --- Sessions ---
  #
  /api/sessions:
    description: Target M1 chat session route; M1c browser chat slice.
    get:
      tags: [Sessions]
      summary: Target route — list the user's chat sessions (M1c)
      description: |
        Returns sessions owned by the authenticated user. M1c sorts by
        `last_inbound_at DESC NULLS LAST`, then `created_at DESC`.
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }
    post:
      tags: [Sessions]
      summary: Target route — create a browser chat session (M1c)
      description: |
        Creates a `web` session. The server generates `sessions.id`, sets
        `chat_id = id::text`, sets `session_key = web:{id}`, and stores a
        human-editable `title`. Missing, empty, or whitespace-only title
        becomes `New chat`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 120
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/sessions/{id}:
    description: Target M1 chat session route; M1c browser chat slice.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Sessions]
      summary: Target route — get a single session (M1c)
      description: |
        Returns one session owned by the authenticated user.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Sessions]
      summary: Target route — rename a session title (M1c)
      description: |
        Renames the human-facing title only. `id`, `chat_id`, and
        `session_key` are server-owned and never change because of rename.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 120
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Sessions]
      summary: Target route — delete a session and its message history (M1c)
      description: |
        Deletes a session owned by the authenticated user. `ON DELETE CASCADE`
        removes its messages.
      responses:
        '204': { description: Deleted. }

  /api/sessions/{id}/messages:
    description: Target M1 chat message route; M1c browser chat slice.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Sessions]
      summary: Target route — paginated older message history (ADR-093; not M1b)
      description: |
        Target M1 route for browser chat/session slices. Not implemented in M1b.

        Returns messages strictly older than the `before` cursor, in
        reverse chronological order. Used when the user scrolls past
        the window that was replayed by `GET /api/sessions/{id}/stream`
        on open. The stream is the canonical "show me the chat"
        entry point; this endpoint exists only for loading older
        batches beyond the replay window.
      parameters:
        - name: before
          in: query
          schema: { type: string }
          description: |
            Return messages created strictly before this `message_id`.
            Omit to start from the very latest message (uncommon — the
            stream's replay normally covers the recent window).
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK — messages in reverse chronological order.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Message' }
    post:
      tags: [Sessions]
      summary: Target route — send a user message and spawn agent work (ADR-013; M1c)
      description: |
        Returns `202 Accepted` immediately after durably accepting the user
        message. If no worker is active for the session, the message is written
        directly to provider-visible `messages` and a worker is spawned. If a
        worker is active, the message is written to `pending_messages` and is
        drained into `messages` at the next safe boundary after the in-flight
        LLM request or tool call completes. Subscribe to
        `GET /api/sessions/{id}/stream` to receive visible transcript events.

        **Browser write allow-list (ADR-098).** `{id}` is `sessions.id`, not
        `session_key`. The server loads the session, verifies ownership, and
        accepts writes only when `channel == "web"` and `session_key` starts
        with `web:`. Discord/Telegram/cron/heartbeat sessions are read-only
        through browser REST and receive messages exclusively from their own
        pipelines.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reasoning_effort:
                  allOf:
                    - $ref: '#/components/schemas/ReasoningEffort'
                  nullable: true
                  description: |
                    Optional per-turn reasoning setting selected by the
                    caller. If omitted or `null`, Plexus omits both
                    `reasoning_effort` and `chat_template_kwargs` from the
                    provider request. If set to an explicit value, Plexus
                    forwards `reasoning_effort` and sends
                    `chat_template_kwargs.enable_thinking`, set to `false`
                    only when the value is `none`; provider incompatibility is
                    surfaced as a persisted synthetic assistant error.
                content:
                  type: array
                  description: |
                    Required OpenAI chat-completions content blocks. M1d no
                    longer accepts string shorthand. Direct image blocks must
                    use inline base64 `data:image/...;base64,...` URLs; external
                    image URLs are rejected.
                  items: { $ref: '#/components/schemas/ContentBlock' }
                attachments:
                  type: array
                  description: |
                    Required workspace file references. Message send validates
                    and reads existing files only; it never moves, copies, or
                    writes attachment files. The request is rejected if both
                    `content` and `attachments` are empty.
                  items: { $ref: '#/components/schemas/MessageAttachmentRef' }
              required: [content, attachments]
              additionalProperties: false
      responses:
        '202':
          description: Message accepted. `message_id` is stable; queued pending rows keep the same id when drained into visible history.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id: { type: string }
        '400':
          description: |
            Session is not browser-writable, JSON/content shape is invalid, or
            an image URL is not an inline base64 data URL. Attachment refs must
            include `plexus_device` and `path`; M1d accepts only
            `plexus_device="server"`. If present, `reasoning_effort` must be
            `null` or one of `none`, `minimal`, `low`, `medium`, `high`, or
            `xhigh`.

  /api/sessions/{id}/stream:
    description: Target M1 chat SSE stream route; M1c browser chat slice.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Sessions]
      summary: Target SSE stream — replay recent history, then live events (ADR-003, ADR-093; M1c)
      description: |
        Opens a Server-Sent Events stream. The server holds the
        connection open and writes `event: <name>\ndata: <json>\n\n`
        chunks as things happen. Cookie auth works because
        EventSource includes credentials with `withCredentials: true`.

        **Replay + live in one stream.** On connect:

        1. **Historical replay.** Server emits up to `replay_limit`
           most-recent persisted messages as `event: message`
           chunks in chronological order. If the request includes
           a `Last-Event-ID` header, replay is "everything after
           that message_id" — EventSource's native reconnect fills
           missed events seamlessly. If the client already has
           history and wants to skip replay entirely, pass
           `replay_limit=0`.
        2. **Cut-over marker.** One-off `event: history_end` with
           empty payload — tells the client "you're live now."
        3. **Live phase.** M1c emits live `event: message` chunks. Future M1
           slices may add `hint`, `session_update`, and `kick`.

        Every `event: message` carries an `id:` SSE header with
        the DB `message_id`; EventSource uses it for
        `Last-Event-ID` on automatic reconnect.
        Live messages whose ids were already emitted during replay are
        skipped server-side. If the live broadcast receiver lags and drops
        events, the server closes the stream so EventSource reconnect can
        replay persisted rows from `Last-Event-ID`.

        **Event names (see `SseEvent*` schemas):**

        - `message` — a persisted user / assistant / tool message
          (both replay and live). M1c assistant messages are terminal
          responses or synthetic Plexus error messages; tool/hint/cancel
          events are future M1 slices.
        - `history_end` — one-off marker between replay and live.
        - `hint` — future transient tool-dispatch notification (ADR-017);
          not persisted, not replayed on reconnect.
        - `session_update` — future state transitions.
        - `kick` — future server-initiated termination.

        OpenAPI does not model SSE first-class; event payloads
        are described under `components.schemas`.
      parameters:
        - name: replay_limit
          in: query
          schema: { type: integer, default: 50, minimum: 0, maximum: 200 }
          description: |
            Maximum messages to replay before entering live mode.
            Ignored when `Last-Event-ID` header is present (server
            replays everything after that ID instead). Pass 0 to
            skip replay entirely.
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema: { type: string }

  /api/sessions/{id}/cancel:
    description: Target M1 chat cancellation route; deferred from M1c.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Sessions]
      summary: Target route — request cancellation at next iteration boundary (ADR-035; not M1c)
      description: |
        Target M1 route, deferred from M1c.

        Sets the session's `cancel_requested` flag. At the next
        iteration boundary, the agent loop inserts
        `"[User pressed stop]"` as a user message and exits. DB may
        end with unpaired tool_use; ADR-014 JIT-repair handles it on
        resume.
      responses:
        '202':
          description: Cancellation requested.

  #
  # --- Workspaces ---
  #
  /api/workspaces:
    description: Target M1 workspace management route; not implemented in M1b.
    get:
      tags: [Workspaces]
      summary: Target route — list workspaces the user has access to (personal + shared; not M1b)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Workspace' }
    post:
      tags: [Workspaces]
      summary: Target route — create a shared workspace (caller auto-added to allow-list; not M1b)
      description: |
        Target M1 workspace route. Not implemented in M1b.

        Creates a shared workspace with a fresh UUID and the supplied display
        name. Names are NOT globally unique — two unrelated teams may use the
        same name. The server returns the workspace's id and computed
        addressing form (`name@suffix`, see ADR-108) which is used in
        subsequent URLs and in the agent's tool paths.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, quota_bytes]
              properties:
                name:
                  type: string
                  description: |
                    Display name. Validated per ADR-109 — denylist of `/`, `\`, `\0`,
                    `@`, `:`, `<>"|?*`, control chars; NFC-normalized; trim + collapse
                    internal whitespace; max 64 chars after normalization.
                quota_bytes:
                  type: integer
                  format: int64
                  description: Requested quota. Later workspace slices cap this at configured `system_config.shared_workspace_quota_bytes`; if that key is missing, they must handle setup explicitly.
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '400':
          description: Name failed validation (per ADR-109).
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '409':
          description: |
            Caller is already a member of a workspace whose `name@suffix` form
            collides with the new one (suffix auto-extension exhausted, or the
            caller already has a same-named workspace and would not be able to
            disambiguate). Caller picks a different name.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/workspaces/{workspace_ref}:
    description: Target M1 workspace management route; not implemented in M1b.
    parameters:
      - name: workspace_ref
        in: path
        required: true
        description: |
          The `name@suffix` addressing form (ADR-108). `suffix` is the first 8
          hex chars of the workspace's UUID id (auto-extended on collision).
          Example: `Xmas%20gift@a4f7e2d1`. Spaces in the name URL-encode normally;
          `@` itself does not require encoding (RFC 3986 `pchar`).
        schema: { type: string }
    get:
      tags: [Workspaces]
      summary: Target route — get a workspace's details (not M1b)
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Workspace' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Workspaces]
      summary: Target route — update a shared workspace (rename, change quota; not M1b)
      description: |
        Target M1 workspace route. Not implemented in M1b.

        Any member of the allow-list can rename or change the quota cap
        (ADR-flat-permissions). Rename only mutates `workspaces.name` —
        the on-disk path and `workspaces.id` are unchanged, so no file
        moves happen. The `suffix` portion of the addressing form is
        also unchanged (it is derived from `id`). However, since strict
        mode (ADR-108) requires both `name` and `suffix` to match in
        tool paths, any stored references using the old name return
        404 until the agent re-reads the system prompt.

        Name validation per ADR-109 applies on rename.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                quota_bytes: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Workspace' } } }
        '400':
          description: Name failed validation (per ADR-109) or quota exceeds the admin ceiling.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/workspaces/{workspace_ref}/members:
    description: Target M1 workspace membership route; not implemented in M1b.
    parameters:
      - name: workspace_ref
        in: path
        required: true
        description: The `name@suffix` form (ADR-108).
        schema: { type: string }
    get:
      tags: [Workspaces]
      summary: Target route — list allow-list for a shared workspace (not M1b)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkspaceMember' }
    post:
      tags: [Workspaces]
      summary: Target route — add a user to the allow-list (not M1b)
      description: |
        Target M1 workspace route. Not implemented in M1b.

        Any existing member can add new members. Caller looks up by email or
        user_id. If adding the prospective user would put them into two
        workspaces whose computed `name@suffix` form would collide (rare —
        defended by suffix auto-extension at workspace-create time per
        ADR-108, but still possible on edge cases), the server returns 409
        and the workspace's owner can rename to disambiguate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - { required: [user_id], properties: { user_id: { type: string } } }
                - { required: [email], properties: { email: { type: string, format: email } } }
      responses:
        '201':
          description: Member added.
          content: { application/json: { schema: { $ref: '#/components/schemas/WorkspaceMember' } } }
        '409':
          description: Adding this user would create an unresolvable `name@suffix` collision in their accessible set.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/workspaces/{workspace_ref}/members/{user_id}:
    description: Target M1 workspace membership route; not implemented in M1b.
    parameters:
      - name: workspace_ref
        in: path
        required: true
        description: The `name@suffix` form (ADR-108).
        schema: { type: string }
      - name: user_id
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Workspaces]
      summary: Target route — remove a user from the allow-list (not M1b)
      description: |
        Target M1 workspace route. Not implemented in M1b.

        Any member can remove anyone (including themselves). Removing
        the last member triggers automatic workspace deletion (files
        purged, quota released).
      responses:
        '204': { description: Removed. }

  /api/workspace/quota:
    description: Target M1 personal workspace quota route; not implemented in M1b.
    get:
      tags: [Workspaces]
      summary: Target route — authenticated user's personal quota state (ADR-078; not M1b)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quota' }

  #
  # --- Workspace Files ---
  #
  # NOTE on path params: the server accepts a URL-encoded absolute path as a
  # single `{path}` path-param. Clients should encode `/` as `%2F` inside the
  # param value, OR the server can route via a wildcard and keep slashes raw.
  # Implementation choice — the OpenAPI shape is the same either way.
  #
  /api/workspace/files/{path}:
    description: |
      M1d implements GET/PUT/PATCH/DELETE for explicit `plexus_device=server`.
      Dynamic user-device routing is future M1f.
    parameters:
      - name: path
        in: path
        required: true
        description: |
          Path on the target `plexus_device`. In M1d, callers must pass
          explicit `plexus_device=server`; relative paths resolve to the
          authenticated user's personal server workspace. Shared workspace and
          `plexus_device=<device-name>` routing are future M1f/dynamic routing
          work; those routes will resolve paths by that client against its
          configured `workspace_path` and `fs_policy`, exactly like shared file
          tool calls.
        schema: { type: string }
      - $ref: '#/components/parameters/PlexusDevice'
    get:
      tags: [Workspace Files]
      summary: Read server workspace file contents
      responses:
        '200':
          description: OK — returns raw file bytes as `application/octet-stream`.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Workspace Files]
      summary: Write server workspace file contents
      description: |
        Full-content replace. M1d accepts raw `application/octet-stream`
        bytes. Implicit `mkdir -p` on the parent path (ADR-088). Runs through
        workspace_fs quota checks. The REST route also applies a 64 MiB
        request body collection cap before workspace_fs receives the
        bytes.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '204': { description: Written. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Quota lock (SoftLocked), operation exceeds 80% single-op cap, or operation exceeds the 64 MiB REST request body collection cap (UploadTooLarge).
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    patch:
      tags: [Workspace Files]
      summary: Edit a server workspace file by text replacement
      description: |
        M1d server workspace edit. `old_text` must be non-empty and must match
        existing UTF-8 file content. With `replace_all=false`, only the first
        match is replaced; with `replace_all=true`, all exact matches are
        replaced.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_text, new_text]
              additionalProperties: false
              properties:
                old_text: { type: string, minLength: 1 }
                new_text: { type: string }
                replace_all: { type: boolean, default: false }
      responses:
        '200':
          description: Edit applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  replacements: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Quota lock or operation exceeds quota.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '422':
          description: Invalid SKILL.md after edit, if skill validation is active for the edited path.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    delete:
      tags: [Workspace Files]
      summary: Delete a single server workspace file
      description: |
        Deletes a file from the caller's server workspace. Always allowed
        regardless of quota lock state.
      responses:
        '204': { description: Deleted. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/workspace/folders/{path}:
    description: M1d server workspace folder route. Dynamic user-device routing is future M1f.
    parameters:
      - name: path
        in: path
        required: true
        description: Path on the target `plexus_device`, with the same resolution rules as `/api/workspace/files/{path}`.
        schema: { type: string }
      - $ref: '#/components/parameters/PlexusDevice'
    delete:
      tags: [Workspace Files]
      summary: Recursively delete a server workspace folder
      responses:
        '204': { description: Deleted. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Path is a file — use `DELETE /api/workspace/files/{path}`.

  /api/workspace/list/{path}:
    description: M1d server workspace directory listing route. Dynamic user-device routing is future M1f.
    parameters:
      - name: path
        in: path
        required: true
        description: Directory path on the target `plexus_device`, with the same resolution rules as `/api/workspace/files/{path}`.
        schema: { type: string }
      - $ref: '#/components/parameters/PlexusDevice'
    get:
      tags: [Workspace Files]
      summary: List server workspace directory contents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ListDirEntry' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/workspace/glob:
    description: M1d server workspace glob route. Dynamic user-device routing is future M1f.
    get:
      tags: [Workspace Files]
      summary: Find server workspace files by glob pattern
      parameters:
        - $ref: '#/components/parameters/PlexusDevice'
        - { name: pattern, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/workspace/grep:
    description: M1d server workspace grep route. Dynamic user-device routing is future M1f.
    get:
      tags: [Workspace Files]
      summary: Search server workspace file contents
      parameters:
        - $ref: '#/components/parameters/PlexusDevice'
        - { name: pattern, in: query, required: true, schema: { type: string }, description: Rust regex pattern. }
        - { name: path, in: query, required: false, schema: { type: string }, description: Optional file or directory path inside the server workspace. Omit to search the whole personal workspace. }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/workspace/transfer:
    description: Target M1 workspace file transfer route; not implemented in M1b.
    post:
      tags: [Workspace Files]
      summary: Target route — copy or move a file/folder between devices (mirrors `file_transfer`; not M1b)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferRequest' }
      responses:
        '200':
          description: Transfer completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  bytes_transferred: { type: integer, format: int64 }
                  warnings:
                    type: array
                    items: { type: string }
                    description: Non-fatal issues (e.g. cross-device move's delete-after-copy failed).
        '409':
          description: Destination exists, quota lock, operation exceeds single-op cap, or target device is offline/unreachable.

  #
  # --- Devices ---
  #
  /api/devices:
    description: Target M1 device management route; not implemented in M1b.
    get:
      tags: [Devices]
      summary: Target route — list user's devices (not M1b)
      description: |
        Returns all device details for the authenticated user in one array.
        M1e does not paginate this route and does not implement
        `GET /api/devices/{name}`. Responses include `token_hint` for user
        confirmation and never include the plaintext token.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Device' }
    post:
      tags: [Devices]
      summary: Target route — register a new device (returns the token ONCE; not M1b)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: |
                    Raw device name to normalize into the stored canonical
                    slug. The stored value is unique within the user's
                    devices, uses lowercase ASCII letters, digits, and
                    hyphens, is at most 64 characters, and must not be
                    `server`.
                workspace_path:
                  type: string
                  description: |
                    Optional. Defaults to the literal string `~/plexus/workspace`
                    for every OS (Linux/macOS/Windows) per ADR-111 if omitted.
                    The client expands `~` against its own home directory at
                    startup; the server stores and returns the unexpanded form.
                fs_policy:
                  type: string
                  enum: [sandbox, unrestricted]
                  default: sandbox
                shell_timeout_max:
                  type: integer
                  default: 300
                ssrf_whitelist:
                  type: array
                  items: { type: string }
                mcp_servers:
                  type: object
                  additionalProperties: true
                  description: |
                    Map of MCP server configs. Stored with full env secrets.
                    Requests reject the redaction marker `"<redacted>"` in
                    any `mcp_servers.*.env.*` value.
      responses:
        '201':
          description: |
            Device created. The response includes the token ONCE — it is
            never returned again. Lost tokens require `POST /api/devices/{name}/regenerate-token`.
            Client startup uses the token via the `PLEXUS_DEVICE_TOKEN` env
            var; everything else (workspace_path, fs_policy, ssrf_whitelist,
            etc.) is fetched from the server's `hello_ack` frame at the
            WebSocket handshake (see PROTOCOL.md, ADR-096 / ADR-097).
          content:
            application/json:
              schema:
                type: object
                required: [token, device]
                properties:
                  token:
                    type: string
                    description: Bearer token the device sends at WebSocket handshake. Shown once.
                  device: { $ref: '#/components/schemas/Device' }

  /api/devices/{name}/config:
    description: Target M1 device management route; not implemented in M1b.
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [Devices]
      summary: Target route — update device config (fs_policy, timeouts, SSRF, MCPs; not M1b)
      description: |
        Target M1 device route. Not implemented in M1b.

        Changes are pushed to the connected device (if online) as a
        `ServerToClient::ConfigUpdate` frame (ADR-050). Setting
        `fs_policy` to `unrestricted` requires typed-device-name
        confirmation in the UI (ADR-051); this endpoint accepts the
        flip but the UI is expected to enforce confirmation before
        calling it. If `name` is provided, it renames the device after
        canonical M1e slug validation; `server` remains reserved and is
        rejected. Requests reject the redaction marker `"<redacted>"` in
        any `mcp_servers.*.env.*` value.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Optional rename. Normalized to a canonical per-user slug and must not be `server`.
                fs_policy: { type: string, enum: [sandbox, unrestricted] }
                shell_timeout_max: { type: integer }
                ssrf_whitelist:
                  type: array
                  items: { type: string }
                mcp_servers:
                  type: object
                  additionalProperties: true
                  description: |
                    Map of MCP server configs. Stored with full env secrets.
                    REST responses redact every `env` value as `"<redacted>"`;
                    writes reject that marker.
                workspace_path: { type: string }
      responses:
        '200':
          description: Updated.
          content: { application/json: { schema: { $ref: '#/components/schemas/Device' } } }

  /api/devices/{name}:
    description: Target M1 device management route; not implemented in M1b.
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Devices]
      summary: Target route — remove a device (revokes its token; not M1b)
      description: Deletes the device row and closes any active WebSocket connection.
      responses:
        '204': { description: Removed. }

  /api/devices/{name}/regenerate-token:
    description: Target M1 device token route; not implemented in M1b.
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Devices]
      summary: Target route — regenerate the device's auth token (not M1b)
      description: |
        Target M1 device route. Not implemented in M1b.

        Invalidates the old token, returns a new one exactly once, and
        preserves the existing device config. Any active connection for the
        old token is closed; the user must update client config with the new
        token.
      responses:
        '200':
          description: New token.
          content:
            application/json:
              schema:
                type: object
                required: [token, device]
                properties:
                  token: { type: string }
                  device: { $ref: '#/components/schemas/Device' }

  #
  # --- Channels ---
  #
  /api/channels/discord:
    description: Target M1 Discord channel config route; not implemented in M1b.
    get:
      tags: [Channels]
      summary: Target route — get the user's Discord config (not M1b)
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/DiscordConfig' } } }
        '404':
          description: No Discord config set.
    put:
      tags: [Channels]
      summary: Target route — set or update the user's Discord config (not M1b)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bot_token, partner_chat_id]
              properties:
                bot_token: { type: string }
                partner_chat_id: { type: string }
      responses:
        '200':
          description: Saved.
          content: { application/json: { schema: { $ref: '#/components/schemas/DiscordConfig' } } }
    delete:
      tags: [Channels]
      summary: Target route — remove the user's Discord config (not M1b)
      responses:
        '204': { description: Removed. }

  /api/channels/telegram:
    description: Target M1 Telegram channel config route; not implemented in M1b.
    get:
      tags: [Channels]
      summary: Target route — get the user's Telegram config (not M1b)
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/TelegramConfig' } } }
        '404':
          description: No Telegram config set.
    put:
      tags: [Channels]
      summary: Target route — set or update the user's Telegram config (not M1b)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bot_token, partner_chat_id]
              properties:
                bot_token: { type: string }
                partner_chat_id: { type: string }
      responses:
        '200':
          description: Saved.
          content: { application/json: { schema: { $ref: '#/components/schemas/TelegramConfig' } } }
    delete:
      tags: [Channels]
      summary: Target route — remove the user's Telegram config (not M1b)
      responses:
        '204': { description: Removed. }

  #
  # --- Cron ---
  #
  /api/cron:
    description: Target M1 cron management route; not implemented in M1b.
    get:
      tags: [Cron]
      summary: Target route — list the user's cron jobs (not M1b)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CronJob' }
    post:
      tags: [Cron]
      summary: Target route — create a cron job (mirrors `cron` tool, ADR-053; not M1b)
      description: |
        Target M1 cron route. Not implemented in M1b.

        REST-created jobs provide their delivery channel + chat_id
        explicitly. Agent-created jobs use the same shared write helper
        but inherit channel + chat_id from ToolContext. Each firing
        synthesizes an `InboundMessage` into a dedicated cron session.

        The shared helper validates the schedule before storing it:
        exactly one of `every_seconds`, `cron_expr`, or `at`; positive
        intervals; valid cron expressions; known IANA timezone when `tz`
        is present; and a future `next_fire_at`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, channel, chat_id]
              properties:
                name:
                  type: string
                  description: Optional short human-readable label. Defaults to the first 30 characters of description.
                description:
                  type: string
                  description: Becomes the synthesized user message at firing time.
                every_seconds:
                  type: integer
                  minimum: 1
                  description: Interval in seconds for recurring jobs. Mutually exclusive with cron_expr and at.
                cron_expr:
                  type: string
                  description: Cron expression like "0 9 * * *". Mutually exclusive with every_seconds and at.
                tz:
                  type: string
                  description: Optional IANA timezone for cron_expr and naive at timestamps.
                at:
                  type: string
                  format: date-time
                  description: One-shot future execution time. Mutually exclusive with every_seconds and cron_expr.
                deliver:
                  type: boolean
                  default: true
                  description: Whether to deliver the final response to the stored channel/chat_id.
                channel:
                  type: string
                  description: Delivery channel for the final response, e.g. "web", "discord", or "telegram".
                chat_id:
                  type: string
                  description: Delivery target within the channel.
      responses:
        '201':
          description: Created.
          content: { application/json: { schema: { $ref: '#/components/schemas/CronJob' } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/cron/{id}:
    description: Target M1 cron management route; not implemented in M1b.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Cron]
      summary: Target route — get a cron job (not M1b)
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/CronJob' } } }
    patch:
      tags: [Cron]
      summary: Target route — update schedule, delivery, or description (not M1b)
      description: |
        Target M1 cron route. Not implemented in M1b.

        Uses the same shared cron write helper as create/delete, so schedule
        updates are validated and the cron ticker is notified after the row
        changes.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                every_seconds:
                  type: integer
                  minimum: 1
                  description: Replaces the schedule with an interval schedule. Mutually exclusive with cron_expr and at.
                cron_expr:
                  type: string
                  description: Replaces the schedule with a cron expression. Mutually exclusive with every_seconds and at.
                tz:
                  type: string
                  description: Optional IANA timezone for cron_expr and naive at timestamps.
                at:
                  type: string
                  format: date-time
                  description: Replaces the schedule with a one-shot future execution time. Mutually exclusive with every_seconds and cron_expr.
                deliver: { type: boolean }
                channel: { type: string }
                chat_id: { type: string }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/CronJob' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Cron]
      summary: Target route — delete a cron job (not M1b)
      responses:
        '204': { description: Deleted. }

  #
  # --- Admin ---
  #
  /api/admin/config:
    get:
      tags: [Admin]
      summary: Get system-wide config (admin only)
      description: |
        Returns admin-visible `system_config` values. Bootstrap does not seed
        default rows, so a fresh server may return `{}`. Secret-bearing values
        such as a configured `llm_api_key` are redacted. Known keys:

          - `quota_bytes` (int) — per-user workspace quota (ADR-046).
          - `shared_workspace_quota_bytes` (int) — quota ceiling that any
            single shared workspace may request. ADR-108.
          - `llm_endpoint` (string) — base URL of the OpenAI-compatible
            chat-completions API (e.g. `https://api.openai.com/v1`,
            `http://litellm:4000/v1`). ADR-101.
          - `llm_api_key` (string) — bearer credential the server uses on
            outbound LLM requests. Write-only in admin API responses: once
            configured, GET/PATCH responses return `"<redacted>"` instead of
            the raw key. ADR-101.
          - `llm_model` (string) — model name passed in the request body
            (e.g. `gpt-4o`). ADR-101.
          - `llm_max_context_tokens` (int) — LLM context window in tokens
            (e.g. `128000`). Counted with tiktoken-rs (ADR-025). ADR-101.
          - `llm_compaction_threshold_tokens` (int) — accepted/reserved
            config for later compaction decisions. Missing means not
            configured; future compaction code must handle that explicitly.
            The intended future trigger compares
            `llm_max_context_tokens − tiktoken_count(prompt)` with
            `llm_compaction_threshold_tokens`; summary `max_output_tokens`
            = `threshold − 4000`. M1b stores the value but does not perform
            compaction decisions. ADR-028, ADR-101.
          - `llm_max_concurrent_requests` (int) — optional
            in-process semaphore in the shared LLM provider layer. A configured
            `0` means unlimited and creates no semaphore. A positive integer
            caps concurrent in-flight LLM calls. Applies to internal
            non-streaming chat-completion calls made through the shared LLM
            provider layer; later chat, cron, heartbeat, and compaction flows
            will use the same layer. If missing at server startup, only the
            runtime limiter treats it as `0`; no row is persisted. ADR-101.
          - `server_mcp` (array of `McpServerConfig`) — admin-configured
            shared-service MCPs, exposed as install site `server`.
            ADR-114. Reserved for the later MCP slice; not accepted by M1b.

        GET response schema uses `additionalProperties: true` because
        deployments may carry deployment-local keys inserted outside the M1b
        admin API; everything not listed above is treated as opaque metadata
        by Plexus. PATCH accepts only the documented M1b-supported keys and
        rejects unsupported keys.

        M1b accepts `llm_endpoint`, `llm_api_key`, and `llm_model` on PATCH
        after validating the merged provider identity with `GET
        {llm_endpoint}/models`. `GET /api/admin/config` redacts a configured
        `llm_api_key` as `"<redacted>"`; callers rotate the key by sending a
        new value and keep the existing key by omitting `llm_api_key`.
        Sending `"<redacted>"` as a new key is rejected. `server_mcp` remains
        documented for the later MCP slice and is not accepted in M1b.
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      tags: [Admin]
      summary: Update system-wide config keys
      description: |
        Partial update — keys present are updated, keys absent are untouched.
        When any of `llm_endpoint`, `llm_api_key`, or `llm_model` changes,
        the server validates the provider before writing: `GET
        {llm_endpoint}/models` must be reachable with the configured bearer
        credential, return a well-formed OpenAI-compatible models response,
        and include the configured `llm_model`. Validation failure returns
        `400 Bad Request` and leaves the existing DB config unchanged.

        First-time LLM identity setup requires `llm_endpoint`, `llm_api_key`,
        and `llm_model` in the same PATCH. After a valid identity exists,
        later PATCHes may reuse stored values by omitting unchanged identity
        keys. `GET /api/admin/config` and successful PATCH responses redact a
        configured `llm_api_key` as `"<redacted>"`; callers rotate the key by
        sending a new value and keep the existing key by omitting
        `llm_api_key`. Sending `"<redacted>"` as a new key is rejected.

        M1b treats configured `llm_max_concurrent_requests=0` as unlimited/no
        semaphore and positive integers as an in-process cap for outbound
        chat-completion calls. If the key is missing at startup, only the
        runtime limiter treats it as `0`; no default row is persisted.
        Negative values and values above the server maximum are invalid.
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: Partial update — keys present are updated, keys absent are untouched.
              properties:
                quota_bytes: { type: integer, format: int64, minimum: 1 }
                shared_workspace_quota_bytes: { type: integer, format: int64, minimum: 1 }
                llm_endpoint: { type: string }
                llm_api_key: { type: string }
                llm_model: { type: string }
                llm_max_context_tokens: { type: integer, format: int64, minimum: 1 }
                llm_compaction_threshold_tokens: { type: integer, format: int64, minimum: 4001 }
                llm_max_concurrent_requests: { type: integer, format: int64, minimum: 0, maximum: 1000000 }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { type: object, additionalProperties: true } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/admin/users:
    description: Target M1 admin user management route; not implemented in M1b.
    get:
      tags: [Admin]
      summary: Target route — list all users (admin only; not M1b)
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  /api/admin/users/{id}:
    description: Target M1 admin user management route; not implemented in M1b.
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Admin]
      summary: Target route — get a user (admin only; not M1b)
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/User' } } }
    delete:
      tags: [Admin]
      summary: Target route — delete a user (admin only; cascades to all their resources; not M1b)
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      responses:
        '204': { description: Deleted. }

  /api/admin/server-mcp:
    description: Target M1 admin server MCP management route; not implemented in M1b.
    get:
      tags: [Admin]
      summary: Target route — list server-side (admin-configured) MCPs (not M1b)
      description: |
        Target M1 admin server MCP route. Not implemented in M1b.

        Lists admin shared-service MCPs only. These use admin-provided
        shared credentials, are intended for stateless or low-state service
        tools such as search and internal KB lookup, and appear to agents
        as install site `plexus_device="server"`.
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/McpServerConfig' }
    put:
      tags: [Admin]
      summary: Target route — replace the server-side MCP list (admin only; not M1b)
      description: |
        Target M1 admin server MCP route. Not implemented in M1b.

        Replaces admin shared-service MCPs stored in
        `system_config.server_mcp`. M1 supports one runtime per configured
        MCP server with a bounded per-MCP call queue. User-scoped server
        MCPs and session-scoped MCPs are out of scope; users who need
        personal OAuth/session/browser/IDE state should configure MCPs on
        their own devices.

        Collision detection per ADR-049, two cases:
          - **Within-server dup** — an MCP server advertises two
            capabilities that wrap to the same name (intra-surface only;
            cross-surface collisions impossible by ADR-048's typed-infix
            naming). Returns `409 Conflict` and does not apply.
          - **Cross-install schema drift** — a new MCP's wrapped name
            matches an existing install with a different `input_schema`
            across any surface (tool / resource / prompt). Returns
            `409 Conflict` with a structured diff and does not apply.

        Spawn or initial `list_tools/resources/prompts` failure returns
        `400 Bad Request` and does not apply. The server validates the new
        list before replacing `system_config.server_mcp`.
      security:
        - cookieAuth: [admin]
        - bearerAuth: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/McpServerConfig' }
      responses:
        '200':
          description: Applied.
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Schema collision with an existing MCP install.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: plexus_session
      description: HttpOnly; SameSite=Strict JWT cookie set by `/api/auth/login` and `/api/auth/register`. `Secure` is controlled by `PLEXUS_COOKIE_SECURE`; production deployments should enable it behind TLS, while local dev may omit it.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: For programmatic clients (CLI, scripts). Same JWT as the cookie, just delivered differently (ADR-004).

  parameters:
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
    Offset:
      name: offset
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
    PlexusDevice:
      name: plexus_device
      in: query
      required: true
      description: |
        Install site for file operations. M1d requires explicit
        `plexus_device=server`, Plexus's built-in server workspace. Dynamic
        user-device routing over `/ws/device` is future M1f; then the client
        will apply its `workspace_path` and `fs_policy`, and offline devices
        will return an error with code `device_unreachable`.
      schema:
        type: string
        enum: [server]

  responses:
    BadRequest:
      description: Malformed request.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Missing or invalid authentication.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Authenticated but not authorized for this resource.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource does not exist.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            Stable error code from `plexus-common/src/errors/`.
            Examples: `not_found`, `forbidden`, `soft_locked`,
            `upload_too_large`, `invalid_skill_format`,
            `private_address_blocked`, `ambiguous_edit`,
            `no_match`, `invalid_schedule`, `destination_exists`.
        message: { type: string }

    User:
      type: object
      required: [id, email, name, is_admin, created_at]
      properties:
        id: { type: string, description: UUID v4. }
        email: { type: string, format: email }
        name: { type: string }
        is_admin: { type: boolean }
        bytes_used: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    Session:
      type: object
      required: [id, user_id, session_key, channel, chat_id, title, created_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        session_key:
          type: string
          description: Composite key; usually `{channel}:{chat_id}` (ADR-006). Browser sessions use `web:{id}` and clients cannot set or rename it.
        channel: { type: string }
        chat_id: { type: string }
        title:
          type: string
          description: Human-facing mutable title. Defaults to `New chat`.
        last_inbound_at: { type: string, format: date-time }
        cancel_requested: { type: boolean }
        created_at: { type: string, format: date-time }

    Message:
      type: object
      required: [id, session_id, role, content, created_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        role: { type: string, enum: [user, assistant, tool] }
        is_compaction_summary:
          type: boolean
          description: If true, this assistant row is a compaction summary (ADR-089), not a regular assistant turn.
        content:
          type: array
          items: { $ref: '#/components/schemas/ContentBlock' }
        reasoning_content:
          type: string
          nullable: true
          description: |
            Assistant reasoning text normalized from provider-native
            `reasoning_content` or a leading `<think>...</think>` block. Null
            for user/tool messages or assistant messages without reasoning.
        created_at: { type: string, format: date-time }

    ReasoningEffort:
      type: string
      enum: [none, minimal, low, medium, high, xhigh]
      description: |
        Optional browser-selected per-turn reasoning setting. Frontend labels
        may render `none` as "off"; the wire value remains `none`.

    ContentBlock:
      description: OpenAI chat-completions content block. See ADR-059, ADR-101, ADR-115.
      oneOf:
        - type: object
          required: [type, text]
          properties:
            type: { type: string, enum: [text] }
            text: { type: string }
        - type: object
          required: [type, image_url]
          properties:
            type: { type: string, enum: [image_url] }
            image_url:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  description: |
                    Inline base64 data URL (`data:image/png;base64,...`). M1d
                    rejects remote image URLs. Workspace attachment
                    expansion is represented separately by a path-text marker
                    plus a generated base64 image block.
        - type: object
          required: [type, id, name, input]
          properties:
            type: { type: string, enum: [tool_use] }
            id: { type: string }
            name: { type: string }
            input: { type: object, additionalProperties: true }
        - type: object
          required: [type, tool_use_id, content]
          properties:
            type: { type: string, enum: [tool_result] }
            tool_use_id: { type: string }
            content: { type: string }
            is_error: { type: boolean, default: false }

    MessageAttachmentRef:
      type: object
      required: [plexus_device, path]
      additionalProperties: false
      properties:
        plexus_device:
          type: string
          enum: [server]
          description: |
            Required file target. M1d accepts only `server`; M1f expands this
            enum through automatic device/install-site detection.
        path:
          type: string
          description: Existing file path in the authenticated user's server workspace.

    Workspace:
      type: object
      required: [id, name, type, quota_bytes, bytes_used]
      properties:
        id:
          type: string
          format: uuid
          description: |
            UUID. For personal workspaces, equals the owner's `users.id`.
            For shared workspaces, the `workspaces.id` row PK (ADR-108).
            Drives the on-disk path `{PLEXUS_WORKSPACE_ROOT}/{id}/`.
        name:
          type: string
          description: |
            Display name. For personal workspaces, the owner's `users.name`.
            For shared workspaces, the row's `workspaces.name` — NOT
            globally unique; ADR-109 validation rules apply.
        suffix:
          type: string
          description: |
            Present for shared workspaces. First 8 hex chars of `id` (auto-extended
            on collision per ADR-108). The agent and the REST API both address the
            workspace via the `name@suffix` form derived from these two fields.
        ref:
          type: string
          description: |
            Present for shared workspaces. The fully-composed `name@suffix`
            addressing form, ready to drop into a tool path or URL.
            Example: `Xmas gift@a4f7e2d1`. The frontend uses this verbatim
            for `/api/workspaces/{workspace_ref}` URLs.
        type: { type: string, enum: [personal, shared] }
        quota_bytes: { type: integer, format: int64 }
        bytes_used: { type: integer, format: int64 }
        locked: { type: boolean, description: bytes_used > quota_bytes. }
        created_by:
          type: [string, "null"]
          format: uuid
          description: |
            Present for shared workspaces. NULL if the creator's account was
            deleted but the workspace still has other members (ADR-108
            exception to ADR-058's cascade rule).
        members:
          type: array
          description: Present for shared workspaces.
          items: { $ref: '#/components/schemas/WorkspaceMember' }

    WorkspaceMember:
      type: object
      required: [user_id, email, name]
      properties:
        user_id: { type: string }
        email: { type: string, format: email }
        name: { type: string }

    Quota:
      type: object
      required: [quota_bytes, bytes_used, locked]
      properties:
        quota_bytes: { type: integer, format: int64 }
        bytes_used: { type: integer, format: int64 }
        locked: { type: boolean }

    Device:
      type: object
      required: [name, fs_policy, workspace_path, shell_timeout_max, ssrf_whitelist, mcp_servers, online, token_hint, created_at]
      properties:
        name:
          type: string
          description: |
            Canonical per-user slug used in REST paths and tool routing.
            Matches `^[a-z0-9]+(-[a-z0-9]+)*$`, is at most 64 characters,
            and must not be `server`.
        workspace_path:
          type: string
          description: |
            May contain a leading `~`; the client expands at startup.
            Default `~/plexus/workspace` (ADR-111) on every OS when not
            supplied at create time. Explicit overrides are stored verbatim.
        fs_policy: { type: string, enum: [sandbox, unrestricted] }
        shell_timeout_max: { type: integer, description: Seconds. }
        ssrf_whitelist:
          type: array
          items: { type: string }
        mcp_servers:
          type: object
          additionalProperties: true
          description: |
            MCP server configs with every `mcp_servers.*.env.*` value
            redacted as `"<redacted>"` in REST responses. The database stores
            the full unredacted config; device WebSocket config uses the
            stored unredacted value.
        online:
          type: boolean
          description: |
            Derived from the in-memory device WebSocket registry. There are no
            `online` or `last_seen_at` columns in the database.
        token_hint:
          type: string
          description: Confirmation hint such as `plexus_dev_...abcd`; plaintext tokens are not returned by list/update/delete responses.
        created_at: { type: string, format: date-time }

    DiscordConfig:
      type: object
      required: [partner_chat_id]
      properties:
        partner_chat_id: { type: string }
        bot_token:
          type: string
          description: Write-only. Get responses show a masked form (e.g. `****abc1`); never the full token.
        allow_list:
          type: array
          items: { type: string }
          description: |
            Heterogeneous list of Discord-snowflake-shaped strings. An entry can
            be a User ID (the user is allowed to DM/@-mention), a Channel ID
            (every member of that channel can @-mention the bot in that channel),
            or a Guild ID (every member of that guild can @-mention the bot
            anywhere in the guild). The adapter classifies each entry by Discord
            API lookup at receive time. Inbound is allowed if sender_id matches
            a User entry OR the message-context (channel/guild) matches a
            Channel/Guild entry. Allowed messages still get the
            `[untrusted message from <name>]:` wrap (ADR-007); only the partner
            is unwrapped.

    TelegramConfig:
      type: object
      required: [partner_chat_id]
      properties:
        partner_chat_id: { type: string }
        bot_token:
          type: string
          description: Write-only. Get responses show a masked form.
        allow_list:
          type: array
          items: { type: string }
          description: |
            Heterogeneous list of Telegram identifiers. An entry can be a User ID
            (DM allowed), a group Chat ID (every group member can @-mention the
            bot in the group), or a broadcast Channel ID (per Telegram's
            bot-in-channel API rules). Match logic identical to Discord's
            `allow_list`; allowed messages still get the untrusted wrap.

    CronJob:
      type: object
      required: [id, user_id, name, schedule, description, channel, chat_id, deliver, next_fire_at, created_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        name:
          type: string
          description: Short user-facing label.
        schedule:
          type: string
          description: Canonical schedule string after server-side parsing.
        tz:
          type: [string, "null"]
          description: IANA timezone used for cron expressions or naive one-shot timestamps.
        description: { type: string }
        channel: { type: string }
        chat_id: { type: string }
        deliver:
          type: boolean
          description: Whether the final response is delivered to channel/chat_id.
        one_shot: { type: boolean }
        last_fired_at: { type: [string, "null"], format: date-time }
        next_fire_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    TransferRequest:
      type: object
      required: [plexus_src_device, src_path, plexus_dst_device, dst_path, mode]
      description: |
        Mirrors the `file_transfer` tool's args. The reserved `plexus_`
        prefix on the two device fields matches the agent-visible tool
        schema exactly (see docs/TOOLS.md) so REST and tool callers use
        the same names.
      properties:
        plexus_src_device: { type: string, description: "`server` or a device name." }
        src_path: { type: string }
        plexus_dst_device: { type: string, description: "`server` or a device name. Must not already exist at dst_path." }
        dst_path: { type: string }
        mode: { type: string, enum: [copy, move] }

    ListDirEntry:
      type: object
      required: [name, path, kind, size]
      properties:
        name: { type: string, description: Entry name (basename). }
        path: { type: string, description: Relative path from the personal server workspace root. }
        kind: { type: string, enum: [file, directory, symlink, other] }
        size: { type: integer, format: int64, description: File byte length; zero for non-files. }

    McpServerConfig:
      type: object
      required: [name, command]
      description: |
        MCP server configuration. In `system_config.server_mcp`, entries are
        admin shared-service MCPs using shared credentials and the `server`
        install site. In `devices.mcp_servers`, entries run on that device
        and use the device name as the install site.
      properties:
        name:
          type: string
          description: |
            Identifier used in wrapped capability names. Plexus exposes
            tools, resources, and prompts uniformly into the agent's tool
            registry (ADR-047/048):
              - tools     → `mcp_<name>_<tool_name>`
              - resources → `mcp_<name>_resource_<resource_name>`
              - prompts   → `mcp_<name>_prompt_<prompt_name>`
            Typed infixes (`_resource_` / `_prompt_`) prevent cross-surface
            name collisions; intra-surface dups are rejected at install
            time (ADR-049).
        command:
          type: array
          items: { type: string }
          description: Argv to spawn the MCP subprocess (e.g. `["npx", "@foo/mcp-server"]`).
        env:
          type: object
          additionalProperties: { type: string }
        enabled:
          type: array
          items: { type: string }
          description: |
            Optional allow-list of glob patterns matched against the
            post-wrap entry name (ADR-100). When present, only matching
            entries register. When absent, every advertised capability
            registers (default-allow). Examples:
              - `["mcp_notion_*"]` — every notion entry
              - `["mcp_notion_search", "mcp_notion_resource_*"]` — one
                tool plus every resource
              - `["mcp_*_resource_*"]` — every resource from every MCP
        description: { type: string }

    #
    # --- SSE event payloads ---
    #
    SseEventMessage:
      description: |
        Target per-session SSE payload; not emitted by M1b.

        A persisted user/assistant/tool message. Same shape as a
        row from `GET /api/sessions/{id}/messages`. Emitted during
        both historical replay (on stream connect) and live mode
        (as new messages arrive). Each carries an `id:` SSE header
        with the DB `message_id` for EventSource's reconnect.
      allOf:
        - $ref: '#/components/schemas/Message'

    SseEventHint:
      description: Transient tool-dispatch notification (ADR-017, ADR-030). Not persisted, not replayed.
      type: object
      required: [kind, text]
      properties:
        kind:
          type: string
          enum: [tool_dispatch]
        text:
          type: string
          description: E.g., "Executing read_file on server".

    SseEventHistoryEnd:
      description: One-off marker emitted between the replay phase and the live phase. Empty payload.
      type: object
      additionalProperties: false

    SseEventSessionUpdate:
      description: State transitions (cancellation, etc.).
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [cancel_requested, cancelled, resumed]

    SseEventKick:
      description: Server-initiated termination of the stream (shutdown, session deleted).
      type: object
      required: [reason]
      properties:
        reason: { type: string, enum: [server_shutdown, session_deleted] }

    #
    # --- Per-user SSE event payloads (GET /api/me/events, ADR-106) ---
    #
    UserEventMcpRejected:
      description: |
        An MCP server was removed from a device because it failed to
        register (collision per ADR-049) or failed to spawn on the client
        (ADR-105). The DB has already been updated and a corrective
        config_update has already been pushed to the client; this event
        is the user-facing notification.
      type: object
      required: [kind, device, server, reason]
      properties:
        kind: { type: string, enum: [mcp_rejected] }
        device: { type: string, description: Friendly device name (per-user UNIQUE per ADR-091). }
        server: { type: string, description: The MCP server's identifier (the `<name>` in `mcp_<name>_<tool>`). }
        reason:
          type: string
          enum: [schema_collision, within_server_collision, spawn_failed]
        detail:
          type: string
          description: |
            Human-readable failure reason. For collisions, names the
            conflicting install site. For spawn_failed, includes exit
            code + stderr tail.

    UserEventDeviceOnline:
      description: A device's WS handshake completed.
      type: object
      required: [kind, device]
      properties:
        kind: { type: string, enum: [device_online] }
        device: { type: string }

    UserEventDeviceOffline:
      description: A device's WS heartbeat timed out (PROTOCOL.md §1.4).
      type: object
      required: [kind, device, last_seen_at]
      properties:
